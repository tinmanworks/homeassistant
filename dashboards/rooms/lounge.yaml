title: Lounge
views:
- type: sections
  title: Lounge
  sub_title: Media, light, comfort
  path: lounge
  icon: mdi:sofa
  max_columns: 3
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Media
    - type: media-control
      entity: media_player.homepod_mini
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: media-control
      entity: media_player.samsung_monitor
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: custom:mushroom-entity-card
      entity: remote.samsung_monitor_on_off
      name: Monitor Power
      icon: mdi:monitor
      tap_action:
        action: more-info
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: custom:mushroom-entity-card
      entity: button.wake_on_lan_6c_70_cb_f0_15_b0
      name: Wake PC (WOL)
      icon: mdi:lan-connect
      tap_action:
        action: call-service
        service: button.press
        target:
          entity_id: button.wake_on_lan_6c_70_cb_f0_15_b0
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
  - type: grid
    cards:
    - type: heading
      heading: Comfort
    - type: custom:mushroom-light-card
      entity: light.ceiling_light
      name: Ceiling Light
      icon: mdi:ceiling-light
      show_brightness_control: true
      show_color_temp_control: true
      show_color_control: true
      use_light_color: true
      tap_action:
        action: more-info
      hold_action:
        action: fire-dom-event
        browser_mod:
          command: popup
          title: Ceiling Light Settings
          card:
            type: vertical-stack
            cards:
            - type: light
              entity: light.ceiling_light
            - type: entities
              title: Settings
              entities:
              - number.ceiling_light_on_level
              - number.ceiling_light_on_transition_time
              - number.ceiling_light_off_transition_time
              - number.ceiling_light_on_off_transition_time
              - select.ceiling_light_power_on_behavior_on_startup
              - update.ceiling_light_firmware
          deviceID:
          - this
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: custom:mushroom-fan-card
      entity: fan.air_purifier
      name: Air Purifier
      icon: mdi:fan
      show_percentage_control: true
      show_oscillate_control: false
      show_direction_control: false
      tap_action:
        action: more-info
      hold_action:
        action: fire-dom-event
        browser_mod:
          command: popup
          title: Air Purifier Controls
          card:
            type: vertical-stack
            cards:
            - type: tile
              entity: fan.air_purifier
              name: Purifier
              icon: mdi:air-purifier
              icon_animation: true
              features:
              - type: fan-speed
              - type: fan-preset-modes
            - type: entities
              title: Device Toggles
              entities:
              - switch.air_purifier_display
              - switch.air_purifier_child_lock
              - update.air_purifier_firmware
            - type: entities
              title: Sensors
              entities:
              - sensor.air_purifier_air_quality
              - sensor.air_purifier_pm2_5
              - sensor.air_purifier_filter_lifetime
            - type: custom:mini-graph-card
              name: PM2.5 (24h)
              hours_to_show: 24
              points_per_hour: 2
              entities:
              - sensor.air_purifier_pm2_5
              show:
                icon: false
                labels: true
                legend: false
          deviceID:
          - this
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
      icon_animation: true
    - type: entities
      title: Purifier Controls
      entities:
      - switch.air_purifier_display
      - switch.air_purifier_child_lock
      - update.air_purifier_firmware
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: heading
      heading: Ceiling Light Settings
    - type: tile
      entity: number.ceiling_light_on_level
      name: On Level
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: tile
      entity: number.ceiling_light_on_transition_time
      name: On Transition
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: tile
      entity: number.ceiling_light_off_transition_time
      name: Off Transition
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: tile
      entity: number.ceiling_light_on_off_transition_time
      name: On/Off Transition
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: tile
      entity: select.ceiling_light_power_on_behavior_on_startup
      name: Power-on Behavior
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: tile
      entity: update.ceiling_light_firmware
      name: Ceiling Light Firmware
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
  - type: grid
    cards:
    - type: heading
      heading: Echo & Notifications
    - type: entities
      title: Echo
      entities:
      - switch.echo_do_not_disturb
      - binary_sensor.echo_connectivity
      - binary_sensor.echo_motion
      - sensor.echo_illuminance
      - sensor.echo_next_alarm
      - sensor.echo_next_timer
      - sensor.echo_next_reminder
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
    - type: entities
      title: Notify
      entities:
      - notify.echo_speak
      - notify.echo_announce
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
  - type: grid
    cards:
    - type: heading
      heading: Auto Additions (Generated)
    - type: entities
      title: Light
      entities:
      - light.tv_backlight
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Switch
      entities:
      - switch.george_s_2025_samsung_smart_tv_do_not_disturb
      - switch.light_sensor_bedroom_tv
      - switch.mic_enabletv_backlight
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Button
      entities:
      - button.ceiling_light_identify
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Media Player
      entities:
      - media_player.bedroom_tv
      - media_player.bedroom_tv_2
      - media_player.bedroom_tv_3
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Remote
      entities:
      - remote.bedroom_tv
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Number
      entities:
      - number.effect_speed_tv_backlight
      - number.mic_sensitivity_tv_backlight
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Select
      entities:
      - select.brightness_mode_tv_backlight
      - select.mic_effect_tv_backlight
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Binary Sensor
      entities:
      - binary_sensor.george_s_2025_samsung_smart_tv_connectivity
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Sensor
      entities:
      - sensor.bedroom_tv_energy
      - sensor.bedroom_tv_energy_difference
      - sensor.bedroom_tv_energy_saved
      - sensor.bedroom_tv_power
      - sensor.bedroom_tv_power_energy
      - sensor.bedroom_tv_tv_channel
      - sensor.bedroom_tv_tv_channel_name
      - sensor.george_s_2025_samsung_smart_tv_next_alarm
      - sensor.george_s_2025_samsung_smart_tv_next_reminder
      - sensor.george_s_2025_samsung_smart_tv_next_timer
      - sensor.light_sensor_bedroom_tv_brightness_intensity
      - sensor.light_sensor_bedroom_tv_illuminance
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
    - type: entities
      title: Notify
      entities:
      - notify.george_s_2025_samsung_smart_tv_announce
      - notify.george_s_2025_samsung_smart_tv_speak
      card_mod:
        style: 'ha-card { border-radius: 18px; }'
