title: All Entities
views:
  - type: sections
    title: All Entities
    sub_title: Complete live entity catalog
    path: all-entities
    icon: mdi:format-list-bulleted
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # All Entities Catalog
              Run the live sync command to populate this view from your current Home Assistant entities.

              ```bash
              python3 python/tools/dashboard_export.py sync-live --ha-url "$HA_URL" --ha-token "$HA_TOKEN"
              ```
            card_mod:
              style: |
                ha-card { border-radius: 18px; }
