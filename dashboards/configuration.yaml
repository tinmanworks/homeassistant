                        - number.ceiling_light_off_transition_time
                        - number.ceiling_light_on_off_transition_time
                        - select.ceiling_light_power_on_behavior_on_startup
                        - update.ceiling_light_firmware
                deviceID:
                  - this
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: fan.air_purifier
            name: Air Purifier
            icon: mdi:air-purifier
            tap_action:
              action: fire-dom-event
              browser_mod:
                command: popup
                title: Air Purifier
                card:
                  type: vertical-stack
                  cards:
                    - type: tile
                      entity: fan.air_purifier
                      name: Purifier
                    - type: entities
                      title: Controls
                      entities:
                        - switch.air_purifier_display
                        - switch.air_purifier_child_lock
                        - update.air_purifier_firmware
                    - type: custom:mini-graph-card
                      name: PM2.5 (24h)
                      hours_to_show: 24
                      points_per_hour: 2
                      entities:
                        - sensor.air_purifier_pm2_5
                      show:
                        icon: false
                        labels: true
                        legend: false
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: entities
            title: Purifier Controls
            entities:
              - switch.air_purifier_display
              - switch.air_purifier_child_lock
              - update.air_purifier_firmware
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

      - type: grid
