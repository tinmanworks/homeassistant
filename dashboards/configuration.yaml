              style: |
                ha-card { border-radius: 16px; }

          - type: entities
            title: WorkStation (Live)
            entities:
              - sensor.workstation_power
              - sensor.workstation_current
              - sensor.workstation_voltage
              - sensor.workstation_signal_strength
              - sensor.workstation_config_overtemp_type
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

      - type: grid
        cards:
          - type: heading
            heading: History (24h)

          - type: custom:mini-graph-card
            name: MainDesk Power (24h)
            hours_to_show: 24
            points_per_hour: 2
            entities:
              - sensor.maindesk_power
            show:
              icon: false
              labels: true
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: custom:mini-graph-card
            name: WorkStation Power (24h)
            hours_to_show: 24
            points_per_hour: 2
            entities:
              - sensor.workstation_power
            show:
              icon: false
              labels: true
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: custom:mini-graph-card
            name: Energy (kWh) (24h)
            hours_to_show: 24
            points_per_hour: 2
            entities:
              - entity: sensor.maindesk_energy
                name: MainDesk
              - entity: sensor.workstation_energy
                name: WorkStation
            show:
              icon: false
              labels: true
              legend: true
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

  # =========================
  # LOUNGE (Media + Comfort)
