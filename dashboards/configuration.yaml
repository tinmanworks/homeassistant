              style: |
                ha-card { border-radius: 16px; }

      - type: grid
        cards:
          - type: heading
            heading: Power Trend (24h)

          - type: custom:mini-graph-card
            name: MainDesk Power
            hours_to_show: 24
            points_per_hour: 2
            entities:
              - sensor.maindesk_power
            show:
              icon: false
              labels: true
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: custom:mini-graph-card
            name: WorkStation Power
            hours_to_show: 24
            points_per_hour: 2
            entities:
              - sensor.workstation_power
            show:
              icon: false
              labels: true
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

  # =========================
  # SYSTEM (Updates + Backups)
