    icon: mdi:lightning-bolt
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: kWh Totals

          - type: entities
            title: MainDesk
            entities:
              - sensor.maindesk_energy
              - sensor.maindesk_consumption
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: entities
            title: WorkStation
            entities:
              - sensor.workstation_energy
              - sensor.workstation_consumption
