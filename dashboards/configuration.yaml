views:
  # =========================
  # HOME (Command Center)
  # =========================
  - type: sections
    title: Home
    sub_title: Mode + essentials + status
    path: home
    icon: mdi:home
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Mode & Essentials

          - type: tile
            entity: input_select.room_mode
            name: Room Mode
            icon: mdi:home-variant

          - type: tile
            entity: light.ceiling_light
            name: Ceiling Light
            icon: mdi:ceiling-light

          - type: tile
            entity: fan.air_purifier
            name: Air Purifier
            icon: mdi:air-purifier

          - type: tile
            entity: remote.samsung_monitor_on_off
            name: Monitor Power
            icon: mdi:monitor

          - type: tile
            entity: switch.smart_switch_25021405918612510d01c4e7ae1322c3_outlet
            name: MainDesk Power
            icon: mdi:power-socket-eu

          - type: tile
            entity: switch.smart_switch_25021451086062510d01c4e7ae1321fa_outlet
            name: WorkStation Power
            icon: mdi:power-socket-eu

      - type: grid
        cards:
          - type: heading
            heading: Presence & Sensors

          - type: entities
            title: Presence
            entities:
              - person.george_gil
              - device_tracker.georges_iphone
              - device_tracker.georges_ipad_pro
              - device_tracker.zfold7

          - type: entities
            title: Lounge Sensors (Echo)
            entities:
              - binary_sensor.echo_connectivity
              - binary_sensor.echo_motion
              - sensor.echo_illuminance
              - sensor.echo_next_alarm
              - sensor.echo_next_timer
              - sensor.echo_next_reminder

      - type: grid
        cards:
          - type: heading
            heading: Air & Weather

          - type: weather-forecast
            entity: weather.forecast_home
            name: Forecast

          - type: entities
            title: Air Quality
            entities:
              - sensor.air_purifier_air_quality
              - sensor.air_purifier_pm2_5
              - sensor.air_purifier_filter_lifetime


  # =========================
  # WORKSPACE (Power + Metrics)
  # =========================
  - type: sections
    title: WorkSpace
    sub_title: Plugs, power, and reliability
    path: workspace
    icon: mdi:desk
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Controls

          - type: tile
            entity: switch.smart_switch_25021405918612510d01c4e7ae1322c3_outlet
            name: MainDesk Outlet
            icon: mdi:power-socket-eu

          - type: tile
            entity: switch.smart_switch_25021451086062510d01c4e7ae1321fa_outlet
            name: WorkStation Outlet
            icon: mdi:power-socket-eu

          - type: tile
            entity: button.smart_switch_25021405918612510d01c4e7ae1322c3_refresh
            name: Refresh MainDesk
            icon: mdi:refresh

          - type: tile
            entity: button.smart_switch_25021451086062510d01c4e7ae1321fa_refresh
            name: Refresh WorkStation
            icon: mdi:refresh

      - type: grid
        cards:
          - type: heading
            heading: Live Power

          - type: entities
            title: MainDesk (Live)
            entities:
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_power
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_current
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_voltage
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_signal_strength

          - type: entities
            title: WorkStation (Live)
            entities:
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_power
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_current
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_voltage
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_signal_strength

      - type: grid
        cards:
          - type: heading
            heading: History (24h)

          - type: history-graph
            title: MainDesk Power
            hours_to_show: 24
            entities:
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_power

          - type: history-graph
            title: WorkStation Power
            hours_to_show: 24
            entities:
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_power


  # =========================
  # LOUNGE (Media + Comfort)
  # =========================
  - type: sections
    title: Lounge
    sub_title: Media, light, comfort
    path: lounge
    icon: mdi:sofa
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Media

          - type: media-control
            entity: media_player.homepod_mini

          - type: media-control
            entity: media_player.samsung_monitor

          - type: tile
            entity: remote.samsung_monitor_on_off
            name: Monitor Power
            icon: mdi:monitor

      - type: grid
        cards:
          - type: heading
            heading: Comfort

          - type: tile
            entity: light.ceiling_light
            name: Ceiling Light
            icon: mdi:ceiling-light

          - type: tile
            entity: fan.air_purifier
            name: Air Purifier
            icon: mdi:air-purifier

          - type: entities
            title: Purifier Controls
            entities:
              - switch.air_purifier_display
              - switch.air_purifier_child_lock

      - type: grid
        cards:
          - type: heading
            heading: Echo & Notifications

          - type: entities
            title: Echo
            entities:
              - switch.echo_do_not_disturb
              - sensor.echo_next_alarm
              - sensor.echo_next_timer
              - sensor.echo_next_reminder

          - type: entities
            title: Notify
            entities:
              - notify.echo_speak
              - notify.echo_announce


  # =========================
  # ENERGY (Totals + kWh)
  # =========================
  - type: sections
    title: Energy
    sub_title: kWh totals and consumption
    path: energy
    icon: mdi:lightning-bolt
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: kWh Totals

          - type: entities
            title: MainDesk
            entities:
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_energy
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_consumption

          - type: entities
            title: WorkStation
            entities:
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_energy
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_consumption

      - type: grid
        cards:
          - type: heading
            heading: Power Trend (24h)

          - type: history-graph
            title: MainDesk Power
            hours_to_show: 24
            entities:
              - sensor.smart_switch_25021405918612510d01c4e7ae1322c3_power

          - type: history-graph
            title: WorkStation Power
            hours_to_show: 24
            entities:
              - sensor.smart_switch_25021451086062510d01c4e7ae1321fa_power


  # =========================
  # SYSTEM (Updates + Backups)
  # =========================
  - type: sections
    title: System
    sub_title: Updates, backups, maintenance
    path: system
    icon: mdi:server
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Updates

          - type: entities
            title: Core
            entities:
              - update.home_assistant_core_update
              - update.home_assistant_operating_system_update
              - update.home_assistant_supervisor_update

          - type: entities
            title: Add-ons
            entities:
              - update.hacs_update
              - update.cloudflared_update
              - update.matter_server_update
              - update.meross_lan_update
              - update.file_editor_update
              - update.terminal_ssh_update
              - update.custom_sidebar_update

      - type: grid
        cards:
          - type: heading
            heading: Backups

          - type: entities
            entities:
              - sensor.backup_backup_manager_state
              - sensor.backup_last_attempted_automatic_backup
              - sensor.backup_last_successful_automatic_backup
              - sensor.backup_next_scheduled_automatic_backup