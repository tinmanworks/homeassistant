            icon: mdi:power-socket-eu
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: switch.workstation_outlet
            name: WorkStation Outlet
            icon: mdi:power-socket-eu
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: switch.maindesk_config_overtemp_enable
            name: MainDesk Overtemp
            icon: mdi:thermometer-alert
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: switch.workstation_config_overtemp_enable
            name: WorkStation Overtemp
            icon: mdi:thermometer-alert
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: button.maindesk_refresh
            name: Refresh MainDesk
            icon: mdi:refresh
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: button.workstation_refresh
            name: Refresh WorkStation
            icon: mdi:refresh
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

      - type: grid
        cards:
          - type: heading
            heading: Live Power

          - type: entities
            title: MainDesk (Live)
            entities:
              - sensor.maindesk_power
              - sensor.maindesk_current
              - sensor.maindesk_voltage
              - sensor.maindesk_signal_strength
              - sensor.maindesk_config_overtemp_type
