            icon: mdi:monitor
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: button.wake_on_lan_6c_70_cb_f0_15_b0
            name: Wake PC (WOL)
            icon: mdi:lan-connect
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

      - type: grid
        cards:
          - type: heading
            heading: Comfort

          - type: tile
            entity: light.ceiling_light
            name: Ceiling Light
            icon: mdi:ceiling-light
            tap_action:
