views:
  # =========================
  # HOME (Command Center)
  # =========================
  - type: sections
    title: Home
    sub_title: Mode + essentials + status
    path: home
    icon: mdi:home
    max_columns: 3

    # Useful HACS: layout-card (optional), card-mod, browser_mod, mini-graph-card
    # This view stays native "sections" for stability; we use card-mod + mini-graph-card + browser_mod.

    sections:
      - type: grid
        cards:
          - type: heading
            heading: Mode & Essentials

          # =========================
          # Mode buttons (with subtle styling)
          # =========================
          - type: horizontal-stack
            cards:
              - type: button
                name: Workspace
                icon: mdi:desk
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  target:
                    entity_id: input_select.room_mode
                  data:
                    option: WorkSpace
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }

              - type: button
                name: Lounge
                icon: mdi:sofa
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  target:
                    entity_id: input_select.room_mode
                  data:
                    option: Lounge
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }

              - type: button
                name: Sleep
                icon: mdi:sleep
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  target:
                    entity_id: input_select.room_mode
                  data:
                    option: Sleep
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }

              - type: button
                name: Away
                icon: mdi:exit-run
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  target:
                    entity_id: input_select.room_mode
                  data:
                    option: Away
                card_mod:
                  style: |
                    ha-card { border-radius: 16px; }

          # Current mode (clean entity row)
          - type: entity
            entity: input_select.room_mode
            name: Current Room Mode
            icon: mdi:home-variant
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          # =========================
          # Quick tiles
          # =========================
          - type: tile
            entity: light.ceiling_light
            name: Ceiling Light
            icon: mdi:ceiling-light
            tap_action:
              action: fire-dom-event
              browser_mod:
                command: popup
                title: Ceiling Light
                card:
                  type: vertical-stack
                  cards:
                    - type: light
                      entity: light.ceiling_light
                    - type: entities
                      title: Settings
                      entities:
                        - number.ceiling_light_on_level
                        - number.ceiling_light_on_transition_time
                        - number.ceiling_light_off_transition_time
                        - number.ceiling_light_on_off_transition_time
                        - select.ceiling_light_power_on_behavior_on_startup
                        - update.ceiling_light_firmware
                # browser_mod popup width
                deviceID:
                  - this
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: fan.air_purifier
            name: Air Purifier
            icon: mdi:air-purifier
            tap_action:
              action: fire-dom-event
              browser_mod:
                command: popup
                title: Air Purifier
                card:
                  type: vertical-stack
                  cards:
                    - type: tile
                      entity: fan.air_purifier
                      name: Purifier
                    - type: entities
                      title: Controls
                      entities:
                        - switch.air_purifier_display
                        - switch.air_purifier_child_lock
                        - update.air_purifier_firmware
                    - type: custom:mini-graph-card
                      name: PM2.5 (24h)
                      hours_to_show: 24
                      points_per_hour: 2
                      entities:
                        - sensor.air_purifier_pm2_5
                      show:
                        icon: false
                        labels: true
                        legend: false
                      card_mod:
                        style: |
                          ha-card { border-radius: 16px; }
                deviceID:
                  - this
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: remote.samsung_monitor_on_off
            name: Monitor Power
            icon: mdi:monitor
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: switch.maindesk_outlet
            name: MainDesk Power
            icon: mdi:power-socket-eu
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: tile
            entity: switch.workstation_outlet
            name: WorkStation Power
            icon: mdi:power-socket-eu
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          # =========================
          # Compact graphs (mini-graph-card)
          # =========================
          - type: custom:mini-graph-card
            name: Desk Power (24h)
            hours_to_show: 24
            points_per_hour: 2
            line_width: 2
            entities:
              - entity: sensor.maindesk_power
                name: MainDesk
              - entity: sensor.workstation_power
                name: WorkStation
            show:
              labels: true
              legend: true
              icon: false
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

      - type: grid
        cards:
          - type: heading
            heading: Presence & Sensors

          - type: entities
            title: Presence
            entities:
              - person.george_gil
              - device_tracker.georges_iphone
              - device_tracker.georges_ipad_pro
              - device_tracker.zfold7
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: entities
            title: Lounge Sensors (Echo)
            entities:
              - binary_sensor.echo_connectivity
              - binary_sensor.echo_motion
              - sensor.echo_illuminance
              - sensor.echo_next_alarm
              - sensor.echo_next_timer
              - sensor.echo_next_reminder
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

      - type: grid
        cards:
          - type: heading
            heading: Air & Weather

          - type: weather-forecast
            entity: weather.forecast_home
            name: Forecast
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: entities
            title: Air Quality
            entities:
              - sensor.air_purifier_air_quality
              - sensor.air_purifier_pm2_5
              - sensor.air_purifier_filter_lifetime
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

          - type: custom:mini-graph-card
            name: Air Quality Trend (24h)
            hours_to_show: 24
            points_per_hour: 2
            entities:
              - entity: sensor.air_purifier_pm2_5
                name: PM2.5
            show:
              icon: false
              labels: true
              legend: false
            card_mod:
              style: |
                ha-card { border-radius: 16px; }

  # =========================
  # WORKSPACE (Power + Metrics)
  # =========================
  - type: sections
