        tap_action:
          action: toggle
        card_mod:
          style: 'ha-card { border-radius: 18px; }

            '
    - type: custom:mini-graph-card
      name: Desk Power (24h)
      hours_to_show: 24
      points_per_hour: 2
      line_width: 2
      entities:
      - entity: sensor.maindesk_power
        name: MainDesk
      - entity: sensor.workstation_power
        name: WorkStation
      show:
        labels: true
        legend: true
        icon: false
      card_mod:
        style: 'ha-card { border-radius: 18px; }

          '
  - type: grid
    cards:
    - type: heading
      heading: Presence & Sensors
    - type: grid
