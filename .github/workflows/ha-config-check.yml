name: ha-config-check

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - feature/**
      - fix/**
      - experiment/**

jobs:
  ha-config-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml


          class HomeAssistantLoader(yaml.SafeLoader):
              """Safe YAML loader that tolerates Home Assistant custom tags."""


          def _ha_tag_constructor(loader, tag_suffix, node):
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              if isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              if isinstance(node, yaml.MappingNode):
                  return loader.construct_mapping(node)
              raise TypeError(f"Unsupported YAML node type: {type(node)!r}")


          # Accept tags like !include, !include_dir_merge_list, !secret, etc.
          HomeAssistantLoader.add_multi_constructor("!", _ha_tag_constructor)
          
          root = pathlib.Path('.')
          yaml_files = sorted(
              p for p in root.rglob('*')
              if p.suffix.lower() in {'.yaml', '.yml'} and '.git' not in p.parts
          )
          failed = []
          for f in yaml_files:
              try:
                  text = f.read_text(encoding='utf-8')
                  list(yaml.load_all(text, Loader=HomeAssistantLoader))
              except Exception as e:
                  failed.append((str(f), str(e)))
          if failed:
              print('YAML validation failed:')
              for path, err in failed:
                  print(f'- {path}: {err}')
              raise SystemExit(1)
          print(f'Validated {len(yaml_files)} YAML file(s).')
          PY
